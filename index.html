<!DOCTYPE html>
<html>
<head>
  <title>Smart Vehicle Safety</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      margin: 20px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .value {
      font-size: 30px;
      font-weight: bold;
      margin-top: 10px;
    }

    .safe {
      color: #00ff88;
      font-weight: bold;
    }

    .alert {
      color: #ff4d4d;
      font-weight: bold;
      font-size: 22px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #ff9800;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>🚗 Smart Vehicle Safety System</h1>

  <div class="card">
    <h2>🍺 Alcohol Level</h2>
    <div id="alcohol" class="value">0</div>
  </div>

  <div class="card">
    <h2>⚡ Acceleration</h2>
    <div id="accel" class="value">0</div>
  </div>

  <div class="card">
    <h2>Status</h2>
    <div id="status" class="safe">SAFE</div>
  </div>

  <button class="btn" onclick="manualTest()">🔴 Test Alert</button>

<script>

let token = "8616202899:AAGQTd1xWfTMxHQLDfBLLruVtJtyDdn2t2c";
let chat_id = "7938594521";

let alertSent = false;

// 🔁 Dummy Data Simulation
setInterval(() => {

  let alcohol = Math.floor(Math.random() * 4000);
  let accel = Math.floor(Math.random() * 4000);

  document.getElementById("alcohol").innerText = alcohol;
  document.getElementById("accel").innerText = accel;

  if ((alcohol > 2500 || accel > 3500) && !alertSent) {

    alertSent = true;
    document.getElementById("status").innerText = "🚨 ALERT";
    document.getElementById("status").className = "alert";

    getLocationAndSend();

  }

}, 4000);


// 📍 Get Location + Send Telegram
function getLocationAndSend() {

  navigator.geolocation.getCurrentPosition(function(position) {

    let lat = position.coords.latitude;
    let lon = position.coords.longitude;

    sendTelegram(lat, lon);

  });

}


// 📩 Telegram Send
function sendTelegram(lat, lon) {

  let message = `🚨 ALERT
Alcohol or Accident Detected
Location: https://maps.google.com/?q=${lat},${lon}`;

  let url = https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)};

  fetch(url)
    .then(() => console.log("Sent"))
    .catch(err => console.log(err));
}


// 🔴 Manual Button Test
<button onclick="manualTest()">🔴 Test Alert</button>

<script>
function manualTest() {
  alert("Button clicked");

  if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(
      function(position) {

        alert("Location OK");

        let lat = position.coords.latitude;
        let lon = position.coords.longitude;

        let token = "YOUR_BOT_TOKEN";
        let chat_id = "7938594521";

        let message = TEST LOCATION https://maps.google.com/?q=${lat},${lon};

        let url = https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)};

        fetch(url);

      },
      function(error) {
        alert("Error: " + error.message);
      }
    );

  } else {
    alert("Geolocation not supported");
  }
}
</script>
</script>

</body>
</html>
