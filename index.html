<!DOCTYPE html>
<html>
<head>
  <title>Smart Vehicle Safety</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .container {
      padding: 10px;
    }

    .card {
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.1);
      margin: 15px;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .title {
      font-size: 18px;
      opacity: 0.8;
    }

    .value {
      font-size: 42px;
      font-weight: bold;
      margin-top: 10px;
    }

    .safe {
      color: #00ffcc;
      font-size: 22px;
      font-weight: bold;
    }

    .alert {
      color: #ff3b3b;
      font-size: 22px;
      font-weight: bold;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% {opacity: 1;}
      50% {opacity: 0.3;}
      100% {opacity: 1;}
    }

    .btn {
      margin-top: 20px;
      padding: 15px 25px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(45deg, #ff416c, #ff4b2b);
      color: white;
      font-size: 18px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>

<h1>🚗 Smart Vehicle Safety System</h1>

<div class="container">

  <div class="card">
    <div class="title">🍺 Alcohol Level</div>
    <div id="alcohol" class="value">0</div>
  </div>

  <div class="card">
    <div class="title">⚡ Acceleration</div>
    <div id="accel" class="value">0</div>
  </div>

  <div class="card">
    <div class="title">Status</div>
    <div id="status" class="safe">SAFE</div>
  </div>

  <button class="btn" onclick="manualTest()">🚨 Test Alert</button>

</div>

<script>

let token = "8616202899:AAGQTd1xWfTMxHQLDfBLLruVtJtyDdn2t2c";
let chat_id = "7938594521";

let alertSent = false;

// 🔁 Dummy Data Simulation
setInterval(() => {

  let alcohol = Math.floor(Math.random() * 4000);
  let accel = Math.floor(Math.random() * 4000);

  document.getElementById("alcohol").innerText = alcohol;
  document.getElementById("accel").innerText = accel;

  if ((alcohol > 2500 || accel > 3500) && !alertSent) {

    alertSent = true;

    let status = document.getElementById("status");
    status.innerText = "🚨 ALERT";
    status.className = "alert";

    getLocationAndSend();
  }

}, 4000);


// 📍 Get Location + Send
function getLocationAndSend() {

  navigator.geolocation.getCurrentPosition(
    function(position) {

      let lat = position.coords.latitude;
      let lon = position.coords.longitude;

      sendTelegram(lat, lon);

    },
    function(error) {
      alert("Location error: " + error.message);
    }
  );
}


// 📩 Telegram Send
function sendTelegram(lat, lon) {

  let message = `🚨 ALERT
Alcohol or Accident Detected
Location: https://maps.google.com/?q=${lat},${lon}`;

  let url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`;

  fetch(url)
    .then(() => console.log("Sent"))
    .catch(err => console.log(err));
}


// 🔴 Manual Test Button
function manualTest() {
  alertSent = false;
  alert("System Test Triggered 🚀");
  getLocationAndSend();
}

</script>

</body>
</html>
